spring:
  datasource:
    url: jdbc:h2:mem:cloud
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect

  cloud:
    aws:
      s3:
        bucket: cloud-project-211535858911-files