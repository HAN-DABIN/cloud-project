spring:
  application:
    name: cloud-project

  profiles:
    active: local

  config:
    import: aws-parameterstore:/cloud-project/prod/

  jpa:
    hibernate:
      ddl-auto: update

  cloud:
    aws:
      region:
        static: ap-northeast-2
      s3:
        bucket: ${S3_BUCKET}

  servlet:
    multipart:
      max-file-size: 10MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info